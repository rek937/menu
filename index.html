
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.page { max-width: 420px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.header { text-align: center; margin-bottom: 2rem; padding-top: 1rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
.header p { font-size: 14px; color: var(--color-text-secondary); }
.dish-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.dish-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.dish-info h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.dish-info p { font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; }
.dish-icon { width: 52px; height: 52px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; font-size: 28px; }
.section-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; letter-spacing: 0.03em; }
.options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.opt-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 13px; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
.opt-btn.selected { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
.qty-row { display: flex; align-items: center; gap: 12px; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); transition: background 0.15s; }
.qty-btn:hover { background: var(--color-background-secondary); }
.qty-num { font-size: 16px; font-weight: 500; min-width: 20px; text-align: center; color: var(--color-text-primary); }
.note-input { width: 100%; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 14px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-secondary); resize: none; margin-top: 0.25rem; }
.note-input:focus { outline: none; border-color: var(--color-border-primary); }
.submit-btn { width: 100%; padding: 14px; border-radius: var(--border-radius-lg); border: none; background: var(--color-text-primary); color: var(--color-background-primary); font-size: 16px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; transition: opacity 0.15s; }
.submit-btn:hover { opacity: 0.85; }
.submit-btn:active { transform: scale(0.98); }
.success-screen { display: none; text-align: center; padding: 3rem 1rem; }
.success-screen h2 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
.success-screen p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; line-height: 1.7; }
.order-summary { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; text-align: left; font-size: 14px; color: var(--color-text-primary); line-height: 2; margin-bottom: 1.5rem; }
.reorder-btn { padding: 10px 24px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; font-size: 14px; cursor: pointer; color: var(--color-text-primary); }
</style>

<div class="page" id="order-page">
  <div class="header">
    <h1>今天想吃什么？</h1>
    <p>厨师已就位，随时为你服务</p>
  </div>

  <div class="dish-card">
    <div class="dish-top">
      <div class="dish-info">
        <h2>蛋炒饭</h2>
        <p>经典家常，百吃不厌</p>
      </div>
      <div class="dish-icon">🍳</div>
    </div>

    <div class="section-label">鸡蛋数量</div>
    <div class="qty-row" style="margin-bottom: 1rem;">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-num" id="qty">2</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
      <span style="font-size: 13px; color: var(--color-text-secondary);">个鸡蛋</span>
    </div>

    <div class="section-label">口味偏好</div>
    <div class="options" id="taste-opts">
      <button class="opt-btn selected" onclick="toggleOpt(this,'taste')">咸淡适中</button>
      <button class="opt-btn" onclick="toggleOpt(this,'taste')">淡一点</button>
      <button class="opt-btn" onclick="toggleOpt(this,'taste')">咸一点</button>
    </div>

    <div class="section-label">加料</div>
    <div class="options" id="extra-opts">
      <button class="opt-btn" onclick="toggleMulti(this)">葱花</button>
      <button class="opt-btn" onclick="toggleMulti(this)">火腿肠</button>
      <button class="opt-btn" onclick="toggleMulti(this)">胡萝卜</button>
      <button class="opt-btn" onclick="toggleMulti(this)">玉米粒</button>
      <button class="opt-btn" onclick="toggleMulti(this)">不加</button>
    </div>

    <div class="section-label">备注</div>
    <textarea class="note-input" id="note" rows="2" placeholder="有什么想说的，比如：米饭少一点…"></textarea>
  </div>

  <button class="submit-btn" onclick="submitOrder()">下单给厨师</button>
</div>

<div class="success-screen" id="success-page">
  <div style="font-size: 48px; margin-bottom: 1rem;">👨‍🍳</div>
  <h2>订单已送到厨师啦！</h2>
  <p>厨师正在为你准备，<br>请耐心等待香喷喷的蛋炒饭</p>
  <div class="order-summary" id="summary-text"></div>
  <button class="reorder-btn" onclick="reorder()">再点一次</button>
</div>

<script>
let qty = 2;
function changeQty(d) {
  qty = Math.max(1, Math.min(5, qty + d));
  document.getElementById('qty').textContent = qty;
}
function toggleOpt(btn, group) {
  document.querySelectorAll('#' + group + '-opts .opt-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}
function toggleMulti(btn) {
  if (btn.textContent === '不加') {
    document.querySelectorAll('#extra-opts .opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    return;
  }
  document.querySelectorAll('#extra-opts .opt-btn').forEach(b => {
    if (b.textContent === '不加') b.classList.remove('selected');
  });
  btn.classList.toggle('selected');
}
function submitOrder() {
  const taste = document.querySelector('#taste-opts .selected')?.textContent || '咸淡适中';
  const extras = [...document.querySelectorAll('#extra-opts .opt-btn.selected')].map(b => b.textContent);
  const note = document.getElementById('note').value.trim();
  const extraText = extras.length ? extras.join('、') : '不加';
  let summary = `蛋炒饭 × 1份\n鸡蛋：${qty} 个\n口味：${taste}\n加料：${extraText}`;
  if (note) summary += `\n备注：${note}`;
  document.getElementById('summary-text').style.whiteSpace = 'pre-line';
  document.getElementById('summary-text').textContent = summary;
  document.getElementById('order-page').style.display = 'none';
  document.getElementById('success-page').style.display = 'block';
}
function reorder() {
  document.getElementById('order-page').style.display = 'block';
  document.getElementById('success-page').style.display = 'none';
  document.getElementById('note').value = '';
  document.querySelectorAll('#extra-opts .opt-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('#taste-opts .opt-btn').forEach((b,i) => { b.classList.toggle('selected', i===0); });
  qty = 2;
  document.getElementById('qty').textContent = 2;
}
</script>
